name: security-scanner
version: 1.0.0
description: "Smart contract security analysis and vulnerability detection"
author: "dokrypt"
license: MIT
type: container

container:
  image: dokrypt-plugins/security-scanner:1.0.0
  ports:
    http: 9300
  environment:
    CHAIN_RPC: "{{chain.default.rpc_url}}"
  depends_on:
    - chain

config:
  properties:
    severity_threshold:
      type: string
      enum: [low, medium, high, critical]
      default: medium
    auto_scan:
      type: boolean
      default: true

hooks:
  - on_contract_deployed

commands:
  - name: security-scan
    description: "Run security analysis on deployed contracts"
  - name: security-report
    description: "Show security findings report"
