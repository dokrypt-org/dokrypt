project_name: dokrypt

builds:
  - id: dokrypt
    main: ./cmd/dokrypt
    binary: dokrypt
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/dokrypt/dokrypt/internal/cli.Version={{.Version}}
      - -X github.com/dokrypt/dokrypt/internal/cli.Commit={{.Commit}}
      - -X github.com/dokrypt/dokrypt/internal/cli.Date={{.Date}}

archives:
  - id: cli
    builds:
      - dokrypt
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^style:"
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Performance
      regexp: "^perf"
      order: 2
    - title: Refactoring
      regexp: "^refactor"
      order: 3
    - title: Other
      order: 999

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  github:
    owner: dokrypt
    name: dokrypt
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
