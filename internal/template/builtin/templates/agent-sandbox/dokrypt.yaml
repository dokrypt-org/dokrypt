version: "1"
name: agent-sandbox
settings:
  runtime: docker
  log_level: info
  accounts: 20
  account_balance: "100000"
chains:
  ethereum:
    engine: anvil
    chain_id: 1
    block_time: "1s"
    accounts: 20
    balance: "100000000000000000000000"
    fork:
      network: mainnet
services:
  explorer:
    type: blockscout
    chain: ethereum
    port: 4000
  oracle:
    type: chainlink-mock
    chain: ethereum
  monitoring:
    type: grafana
    chain: ethereum
